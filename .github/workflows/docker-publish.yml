name: Docker Build and Publish

on:
  push:
    branches: [ "main" ]
    # Uncomment the following to also trigger on release tags
    # tags: [ 'v*.*.*' ]

jobs:
  build-and-push:
    # We depend on the CI checks passing first
    needs: [] # (Optional) If you want to merge both into one workflow or use workflow_call, for now they run in parallel.
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Change this to your actual Docker Hub image name if different
          images: ${{ secrets.DOCKERHUB_USERNAME }}/comfyui-cloud-ready

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
