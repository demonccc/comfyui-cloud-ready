name: CI Static Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python Linters
        run: pip install flake8 yamllint

      - name: Check Python scripts (flake8)
        run: flake8 scripts/

      - name: Check Bash scripts (shellcheck)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

      - name: Check YAML structure (yamllint)
        run: yamllint data/nodes.yaml

      - name: Check Dockerfiles (hadolint)
        run: |
          for f in Dockerfile.*; do
            echo "🔍 Checking $f"
            docker run --rm -i hadolint/hadolint < "$f"
          done

      - name: Check CSV structure
        run: |
          # Ensures models.csv is properly formatted and parseable
          if python -c 'import csv; list(csv.reader(open("data/models.csv")))'; then
            echo "✅ CSV structure is valid."
          else
            echo "❌ CSV validation failed!"
            exit 1
          fi
